<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OpenClaw Hub</title>
  <style>
    :root {
      --tab-bg: #16161b;
      --tab-bg-hover: #1c1c22;
      --tab-border: #420000;
      --tab-active-bg: #0b0b0f;
      --tab-active-border: #420000;
      --tab-active-text: #f0d8d8;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: #eee;
    }
    #topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: #0b0b0f;
      border-bottom: 1px solid #420000;
    }
    #tab-bar {
      display: flex;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #tab-bar li {
      padding: 8px 12px;
      cursor: pointer;
      background: var(--tab-bg);
      color: #f0e7e7;
      border: 1px solid var(--tab-border);
      margin-right: 4px;
    }
    #tab-bar li:hover {
      background: var(--tab-bg-hover);
    }
    #tab-bar li.active {
      background: var(--tab-active-bg);
      color: var(--tab-active-text);
      border-color: var(--tab-active-border);
      border-bottom: 2px solid var(--tab-active-border);
      font-weight: bold;
    }
    #sys-stats {
      font-size: 12px;
      color: #bbb;
      white-space: nowrap;
    }
    #topbar-quote {
      flex: 1;
      min-width: 0;
      font-size: 12px;
      color: #d1d5db;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.9;
    }
    #content {
      height: calc(100vh - 60px);
      background: #0b0b0f;
    }
    #content iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
    #content iframe.active {
      display: block;
    }
    .status-bar {
      padding: 6px 12px;
      border-top: 1px solid #420000;
      font-size: 13px;
      background: #0b0b0f;
    }
  </style>
</head>
<body>
  <div id="topbar">
    <ul id="tab-bar">
      <li data-module="home" class="active" title="Double-click to detach this tab">Home</li>
      <li data-module="history" title="Double-click to detach this tab">Chat</li>
      <li data-module="mission-control" title="Double-click to detach this tab">Mission Control</li>
    </ul>
    <div id="topbar-quote">"Stay focused. Stay consistent."</div>
    <div id="sys-stats">CPU: --% | MEM: --</div>
  </div>

  <div id="content">
    <iframe id="tab-home" src="./modules/home/index.html" class="active"></iframe>
    <iframe id="tab-history" src="./modules/history/index.html"></iframe>
    <iframe id="tab-mission-control" src="./modules/mission-control/index.html"></iframe>
  </div>

  <div class="status-bar">
    <span id="gmail-status">📧 Unread Emails: --</span> |
    <span id="calendar-status">📅 Calendar: --</span>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
