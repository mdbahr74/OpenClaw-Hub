<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OpenClaw Hub Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0f;
      --panel: #141419;
      --panel-alt: #1b1b21;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f5f5f4;
      --muted: #a8a29e;
      --accent: #420000;
      --accent-hover: #5a0909;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: radial-gradient(circle at top, rgba(66, 0, 0, 0.22) 0%, rgba(11, 11, 15, 1) 62%),
        radial-gradient(circle at bottom right, rgba(24, 24, 32, 0.22), transparent 56%);
      color: var(--text);
    }

    body {
      display: flex;
      padding: 24px;
      gap: 24px;
    }

    .panel {
      background: rgba(16, 16, 22, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px);
    }

    .list-panel {
      width: 280px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .list-header {
      padding: 18px 20px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .list-header h2 {
      margin: 0 0 6px;
      font-size: 15px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .search-box {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 16, 20, 0.85);
      color: var(--text);
      font-size: 14px;
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }

    .conversation-item {
      border-radius: 12px;
      padding: 12px 14px;
      margin: 6px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .conversation-item:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-1px);
    }

    .conversation-item.active {
      background: rgba(66, 0, 0, 0.2);
      border: 1px solid rgba(66, 0, 0, 0.45);
    }

    .conversation-item h3 {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 600;
    }

    .conversation-item span {
      font-size: 12px;
      color: var(--muted);
    }

    .detail-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .detail-header {
      padding: 20px 24px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .detail-header h1 {
      margin: 0;
      font-size: 22px;
    }

    .detail-header span {
      font-size: 13px;
      color: var(--muted);
    }

    .transcript {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble {
      max-width: 70%;
      padding: 14px 18px;
      border-radius: 16px;
      line-height: 1.6;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.22);
    }

    .bubble.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(66, 0, 0, 0.96), rgba(90, 9, 9, 0.96));
      border-top-right-radius: 6px;
    }

    .bubble.assistant {
      align-self: flex-start;
      background: rgba(20, 20, 27, 0.95);
      border-top-left-radius: 6px;
    }

    .bubble.assistant.pending {
      position: relative;
      opacity: 0.7;
    }

    .composer {
      padding: 18px 22px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(13, 13, 18, 0.95);
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .composer textarea {
      flex: 1;
      min-height: 72px;
      max-height: 200px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(11, 11, 15, 0.94);
      color: var(--text);
      resize: vertical;
      font-size: 14px;
      line-height: 1.6;
    }

    .composer textarea:focus {
      outline: 2px solid rgba(66, 0, 0, 0.45);
    }

    .composer button {
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--accent);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .composer button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .meta-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .meta-bar .pill {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
    }

    @media (max-width: 1100px) {
      body {
        flex-direction: column;
        padding: 16px;
      }

      .list-panel {
        width: 100%;
        max-height: 260px;
      }

      .conversation-list {
        display: flex;
        overflow-x: auto;
        gap: 10px;
      }

      .conversation-item {
        min-width: 190px;
      }
    }
  </style>
</head>
<body>
  <section class="panel list-panel" aria-label="Conversation list">
    <div class="list-header">
      <h2>OpenClaw Hub Chat</h2>
      <button id="new-chat" style="margin-bottom:8px;width:100%;padding:8px 10px;border-radius:10px;border:1px solid rgba(239,68,68,0.35);background:rgba(239,68,68,0.15);color:#f5f5f5;font-size:13px;cursor:pointer;">+ New chat</button>
      <select id="conversation-select" class="search-box" style="margin-top:4px;" aria-label="Chat sessions"></select>
      <button id="delete-chat" style="margin-top:8px;width:100%;padding:6px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:#2b2f3a;color:#f5f5f5;font-size:12px;cursor:pointer;">Delete selected</button>
    </div>
    <div id="conversation-list" class="conversation-list" role="listbox" aria-label="Saved conversations" style="display:none;"></div>
  </section>

  <section class="panel detail-panel" aria-label="Conversation detail">
    <header class="detail-header">
      <div>
        <h1 id="conversation-title">Select a conversation</h1>
        <span id="conversation-time"></span>
      </div>
      <div class="meta-bar" id="conversation-meta">
        <span class="pill">Agent</span>
        <select id="agent-select" style="padding:4px 8px;border-radius:999px;border:1px solid rgba(255,255,255,0.12);background:rgba(17,19,27,0.95);color:#f5f5f5;font-size:12px;">
          <option value="main">Hex (default)</option>
        </select>
      </div>
    </header>

    <div id="transcript" class="transcript">
      <div class="empty-state">Choose a conversation from the left to review the transcript and continue the discussion.</div>
    </div>

    <div class="composer">
      <textarea id="history-input" placeholder="Type a message…" aria-label="Prompt"></textarea>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button id="history-send">Send</button>
        <button id="promote-chat" style="background:#2b2f3a;border-color:rgba(255,255,255,0.18);">Promote to project</button>
      </div>
    </div>
  </section>

  <script>
    const attachHistoryBridge = () => {
      if (!window.commandDeskBridge && window.parent && window.parent.commandDeskBridge) {
        window.commandDeskBridge = window.parent.commandDeskBridge;
      }
      if (!window.commandDeskInvoke && window.parent && typeof window.parent.commandDeskInvoke === "function") {
        window.commandDeskInvoke = window.parent.commandDeskInvoke;
      }
      if (!window.commandDeskInvoke && window.top && typeof window.top.commandDeskInvoke === "function") {
        window.commandDeskInvoke = window.top.commandDeskInvoke;
      }
    };

    attachHistoryBridge();
    window.addEventListener("message", event => {
      if (event?.data?.bridgeReady) {
        attachHistoryBridge();
      }
    });
  </script>
  <script src="history.js"></script>
</body>
</html>
